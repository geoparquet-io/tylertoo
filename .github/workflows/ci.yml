# CI — the PR quality gates.
#
# Purpose: every job here is a *blocking* check for PRs into main. Humans only
# review what machines can't check; everything below is machine-checked:
#   version-check   version fields stay in sync across the workspace
#   Check           rustfmt, clippy (-D warnings + curated lint set in
#                   Cargo.toml [workspace.lints]), cargo-machete, unit tests
#   Test            full test matrix (ubuntu/macos x stable/beta)
#   Python Quality  ruff check/format, mypy + stubtest, vulture, xenon,
#                   pip-audit — all via uv against the committed lockfile
#   Coverage        cargo-tarpaulin -> codecov
#   Profiling       dhat-heap feature keeps compiling
#   Security Audit  cargo-audit + cargo-deny (advisories/licenses/bans/sources)
#   CI Lint         zizmor (GitHub Actions security linter) on this repo's
#                   own workflows
#
# Benchmarks run in bench.yml (push to main / manual); mutation testing runs
# in mutation-tests.yml (weekly). Neither appears here, so no job in this
# workflow is ever skipped on a PR.
#
# TOOLCHAIN POLICY: floating `stable` for all gates, with a `beta` lane in the
# Test matrix as the early-warning system for upcoming rustc/clippy breakage
# (a new stable clippy once cost a morning — beta surfaces that a cycle
# early). We deliberately do NOT pin the toolchain: a pin needs a scheduled
# bump job that itself rots, while beta failures are visible and actionable.
# All third-party actions are pinned by commit SHA (enforced by zizmor);
# Dependabot bumps the pins.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same PR to keep the feedback loop short.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Version consistency check - MUST pass before any release
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check version consistency
        run: |
          echo "Checking version consistency across workspace..."

          # Extract versions
          WORKSPACE_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          CORE_DEP_VERSION=$(grep 'gpq-tiles-core.*version' Cargo.toml | sed 's/.*version = "\([^"]*\)".*/\1/')
          PYTHON_VERSION=$(grep -m1 '^version = ' crates/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          CZ_VERSION=$(grep '^version = ' .cz.toml | sed 's/version = "\(.*\)"/\1/')

          echo "Versions found:"
          echo "  Cargo.toml workspace.package.version: $WORKSPACE_VERSION"
          echo "  Cargo.toml gpq-tiles-core dependency: $CORE_DEP_VERSION"
          echo "  pyproject.toml version:               $PYTHON_VERSION"
          echo "  .cz.toml version:                     $CZ_VERSION"

          # Check for mismatches
          ERROR=0
          if [ "$WORKSPACE_VERSION" != "$CORE_DEP_VERSION" ]; then
            echo "::error::Version mismatch: workspace=$WORKSPACE_VERSION vs core-dep=$CORE_DEP_VERSION"
            ERROR=1
          fi
          if [ "$WORKSPACE_VERSION" != "$PYTHON_VERSION" ]; then
            echo "::error::Version mismatch: workspace=$WORKSPACE_VERSION vs python=$PYTHON_VERSION"
            ERROR=1
          fi
          if [ "$WORKSPACE_VERSION" != "$CZ_VERSION" ]; then
            echo "::error::Version mismatch: workspace=$WORKSPACE_VERSION vs commitizen=$CZ_VERSION"
            ERROR=1
          fi

          if [ "$ERROR" -eq 1 ]; then
            echo ""
            echo "Fix: Run 'uv run cz bump' from repo root to sync all versions."
            exit 1
          fi

          echo "All versions consistent: $WORKSPACE_VERSION"

  # Fast feedback: formatting, lints, dead deps, unit tests
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache test fixtures
        id: fixture-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: tests/fixtures/realdata
          key: fixtures-v1-${{ runner.os }}

      - name: Download test fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          gh release download fixtures-v1 --dir tests/fixtures/realdata/ --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install cargo-machete
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-machete

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo index
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        # -D warnings also denies the curated [workspace.lints.clippy] set
        # (pedantic subset + cognitive_complexity) defined in Cargo.toml.
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check for unused dependencies
        run: cargo machete

      - name: Run unit tests
        run: cargo test --lib --all-features

  # Full test suite
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Cache test fixtures
        id: fixture-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: tests/fixtures/realdata
          key: fixtures-v1-${{ runner.os }}

      - name: Download test fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          gh release download fixtures-v1 --dir tests/fixtures/realdata/ --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo index
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Run all tests (excluding slow regression tests)
        # Large polygon regression tests are run manually - see tests/fixtures/realdata/README.md
        run: cargo test --all-features -- --skip large_polygon_regression

  # Python bindings: strict lint/type/dead-code/complexity/security gates.
  # Everything runs through uv against the committed uv.lock.
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache cargo (pyo3 build)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.toml') }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: crates/python/uv.lock

      - name: Sync environment (builds the extension module)
        run: uv sync --locked

      - name: ruff check (strict ruleset)
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy

      - name: stubtest (gpq_tiles.pyi matches the built module)
        run: uv run python -m mypy.stubtest gpq_tiles --allowlist stubtest-allowlist.txt

      - name: vulture (dead code)
        run: uv run vulture

      - name: xenon (complexity gate)
        # Max absolute grade C: two golden-report tests rank C today.
        # RATCHET: tighten to B once they are split up — never loosen.
        run: uv run xenon --max-absolute C --max-modules A --max-average A tests

      - name: pip-audit (uv lockfile)
        run: |
          uv export --no-emit-project --format requirements-txt -o /tmp/requirements.txt
          uv run pip-audit -r /tmp/requirements.txt --disable-pip

  # Coverage reporting
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Cache test fixtures
        id: fixture-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: tests/fixtures/realdata
          key: fixtures-v1-${{ runner.os }}

      - name: Download test fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          gh release download fixtures-v1 --dir tests/fixtures/realdata/ --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install tarpaulin
        # Prebuilt binary via install-action; `cargo install cargo-tarpaulin`
        # was several minutes of compile time on every run.
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --out xml --all-features --workspace --exclude gpq-tiles-python

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: ./cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false  # Don't fail if token not configured

  # Profiling features compile check
  profiling:
    name: Profiling Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-profiling-${{ hashFiles('**/Cargo.toml') }}

      - name: Build with dhat-heap feature
        run: cargo build --release --features dhat-heap

  # Security audit: advisories on every PR, plus full supply-chain policy
  # (licenses, bans, sources) via cargo-deny. The weekly security.yml run
  # catches new advisories between PRs.
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-audit,cargo-deny

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo deny (advisories, licenses, bans, sources)
        run: cargo deny check

  # Lint the CI configuration itself.
  ci-lint:
    name: CI Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run zizmor
        run: uvx zizmor==1.26.1 --min-severity low .github/workflows
        env:
          GH_TOKEN: ${{ github.token }}
