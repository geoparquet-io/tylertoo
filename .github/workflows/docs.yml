# Deploy Documentation — mkdocs site to GitHub Pages.
#
# Purpose: build the docs on every push/PR (the build doubles as a docs
# lint) and deploy to Pages on pushes to main.
#
# KNOWN FLAKE: the Pages deploy step occasionally fails with a transient
# "try again later" from GitHub. Policy: manual rerun (Actions -> re-run
# failed jobs). Not worth a retry loop — the failure is rare and a rerun
# always succeeds.

name: Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - name: Build documentation
        # The Python API reference is rendered by mkdocstrings from the
        # tylertoo.pyi stub. griffe reads the stub STATICALLY (the compiled .so
        # is never imported), but it must resolve `tylertoo` on the import path,
        # so we build+install the extension (maturin packages the stub as
        # tylertoo/__init__.pyi). --strict doubles as a docs lint: broken links,
        # missing nav pages, or mkdocstrings resolution failures fail the build.
        run: |
          uv venv
          uv pip install \
            mkdocs-material 'mkdocstrings[python]' mkdocs-redirects black
          uv pip install ./crates/python
          uv run mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
