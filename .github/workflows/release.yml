# Tag-based release workflow
# See CONTRIBUTING.md for the full release strategy
#
# Triggers on version tags (v0.1.0, v1.0.0, etc.) or manual dispatch.
#
# Developer workflow:
# 1. Accumulate changes via normal PR merges
# 2. When ready to release: uv run cz bump --changelog && git push --tags
# 3. Tag push triggers this workflow → publishes to crates.io, PyPI, and a
#    GitHub Release with prebuilt CLI binaries (linux gnu/musl, macOS
#    x86_64/aarch64, windows) and release notes extracted from CHANGELOG.md
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Matches v0.1.0, v1.0.0, etc.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-rust:
    name: Release to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_exists: ${{ steps.release_check.outputs.release_exists }}
    steps:
      # Credentials stay persisted here on purpose: this job pushes the
      # release tag back to the repo in the manual-dispatch recovery path.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION (tag: v$VERSION)"

      - name: Check release status
        id: release_check
        env:
          TAG: v${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, nothing to do"
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG exists but no release - recovery mode"
              echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "Tag $TAG does not exist, full release"
              echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create git tag
        if: steps.release_check.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish tylertoo-core to crates.io
        if: steps.release_check.outputs.release_exists == 'false'
        run: cargo publish --package tylertoo-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish tylertoo (CLI) to crates.io
        if: steps.release_check.outputs.release_exists == 'false'
        run: |
          # Wait for crates.io to index tylertoo-core
          sleep 30
          cargo publish --package tylertoo
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Prebuilt CLI binaries for users without a Rust toolchain (cargo install
  # needs Rust 1.75+ AND protoc — real friction for the GIS audience).
  # Hand-rolled matrix rather than cargo-dist: cargo-dist wants to own the
  # tag → release lifecycle, which conflicts with the recovery-mode logic in
  # release-rust and the crates.io/PyPI publishing already living here.
  build-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            # Cross-compiled from the arm64 runner: Intel macOS runners are
            # retired, and clang + the universal macOS SDK cross-compile
            # x86_64 from arm64 natively.
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      - name: Install musl toolchain
        # zstd-sys, aws-lc-sys, etc. need a musl-targeting C compiler
        # (musl-gcc). The tree is rustls-based — no openssl to vendor.
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --package tylertoo --target "$TARGET"

      - name: Smoke test binary
        # x86_64-apple-darwin is cross-compiled on the arm64 runner; running
        # it would depend on Rosetta being present, so it is not smoke-tested.
        if: matrix.target != 'x86_64-apple-darwin'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          "./target/$TARGET/release/tylertoo" --version

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          STAGE="tylertoo-$VERSION-$TARGET"
          mkdir -p "dist/$STAGE"
          cp "target/$TARGET/release/tylertoo" README.md LICENSE "dist/$STAGE/"
          tar -C dist -czf "dist/$STAGE.tar.gz" "$STAGE"
          rm -r "dist/${STAGE:?}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $stage = "tylertoo-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Path "dist/$stage" | Out-Null
          Copy-Item "target/$env:TARGET/release/tylertoo.exe" "dist/$stage/"
          Copy-Item README.md, LICENSE "dist/$stage/"
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip"
          Remove-Item -Recurse "dist/$stage"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-${{ matrix.target }}
          path: dist
          if-no-files-found: error

  # Creates the GitHub Release with binaries attached and the tagged
  # version's CHANGELOG.md section as the release body. Runs only after
  # crates.io publishing succeeds (same ordering as before, when release
  # creation was the last step of release-rust) and only when the release
  # does not already exist (recovery-mode re-runs skip it, as before).
  github-release:
    name: Create GitHub Release
    needs: [release-rust, build-binaries]
    if: needs.release-rust.outputs.release_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ needs.release-rust.outputs.version }}
        run: |
          cd dist
          sha256sum -- *.tar.gz *.zip > "tylertoo-$VERSION-checksums.txt"
          cat "tylertoo-$VERSION-checksums.txt"

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ needs.release-rust.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Section headings look like "## v0.6.0 (2026-03-11)"; also accept
          # a bare "## v0.7.0". $2 is the version token either way.
          awk -v ver="$TAG" '
            /^## / { if (found) exit; if ($2 == ver) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md section found for $TAG, falling back to link"
            echo "See [CHANGELOG](https://github.com/$REPO/blob/main/CHANGELOG.md) for details." > release-notes.md
          fi
          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          TAG: ${{ needs.release-rust.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --verify-tag \
            --title "$TAG" \
            --notes-file release-notes.md \
            dist/*

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: x86_64
          manylinux: auto
          args: --release --out dist -m crates/python/Cargo.toml
          before-script-linux: |
            # Install protoc inside manylinux container
            curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip
            unzip protoc-25.1-linux-x86_64.zip -d /usr/local
            rm protoc-25.1-linux-x86_64.zip

      - name: Build wheels (macOS)
        if: runner.os == 'macOS'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          args: --release --out dist -m crates/python/Cargo.toml

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          args: --release --out dist -m crates/python/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist -m crates/python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-sdist
          path: dist

  publish-python:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          print-hash: true
          # Uses trusted publishing (OIDC) by default
          # Falls back to PYPI_API_TOKEN if trusted publishing not configured
