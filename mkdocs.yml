site_name: tylertoo
site_description: Fast GeoParquet → PMTiles converter in Rust
site_author: Nissim Lebovits
site_url: https://geoparquet-io.github.io/tylertoo/
repo_name: geoparquet-io/tylertoo
repo_url: https://github.com/geoparquet-io/tylertoo
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/geoparquet-io/tylertoo
      name: tylertoo on GitHub

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Demo (Brazil 2025 fields): demo.md
  - Performance: performance.md
  - Profiling: PROFILING.md
  - Decoding PMTiles: decode.md
  - API Reference: api-reference.md
  - Advanced Usage: advanced-usage.md
  - Remote Reads: remote-reads.md
  - Multi-Partition Input: multi-partition.md
  - Architecture: architecture.md
  - Overview Tuning: OVERVIEW_TUNING.md
  - Development: development.md
  - Contributing: contributing.md
  - Changelog: changelog.md
