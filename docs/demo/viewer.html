<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>tylertoo demo — Brazil field boundaries</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- Pinned CDN deps. PMTiles range reads need the host to serve Range + CORS. -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>

  <style>
    :root { --panel: rgba(17,19,24,.86); --ink:#e7e9ee; --muted:#9aa2b1; --line:#2b3040; }
    html,body { margin:0; height:100%; background:#0b0d12; font:14px/1.4 system-ui,sans-serif; color:var(--ink); }
    #map { position:absolute; inset:0; }
    #panel {
      position:absolute; z-index:5; top:12px; left:12px; max-width:320px;
      background:var(--panel); border:1px solid var(--line); border-radius:10px;
      padding:12px 14px; backdrop-filter:blur(6px);
    }
    #panel h1 { margin:0 0 6px; font-size:14px; font-weight:600; }
    #panel p { margin:0 0 8px; color:var(--muted); font-size:12px; }
    .views { display:flex; gap:6px; flex-wrap:wrap; }
    button { background:#0f1219; color:var(--ink); border:1px solid var(--line);
      border-radius:6px; padding:5px 9px; font:inherit; cursor:pointer; }
    button:hover { border-color:#41506e; }
    #err { position:absolute; z-index:6; bottom:12px; left:12px; right:12px; max-width:620px;
      background:#3a1620; border:1px solid #7a2b3c; color:#ffd9df; border-radius:8px;
      padding:8px 12px; font-size:12px; display:none; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h1>Brazil 2025 field predictions — tylertoo</h1>
    <p>43.9M Fields of The World predictions, filtered from a 630 GiB collection to
       GeoParquet → PMTiles in one native workflow (z0–14): dots zoomed out,
       polygons zoomed in. Rendered on CARTO Dark Matter.</p>
    <div class="views">
      <button data-view="brazil">Brazil</button>
      <button data-view="matogrosso">Mato Grosso</button>
      <button data-view="saopaulo">São Paulo</button>
      <button data-view="riograndedosul">Rio Grande do Sul</button>
      <button data-view="bahia">Bahia (west)</button>
    </div>
  </div>
  <div id="err"></div>

  <script>
    "use strict";

    // Brazil 2025 field-predictions PMTiles on Source Cooperative (Range + CORS).
    // Override at runtime with ?pmtiles=<url>.
    const DEFAULT_PMTILES =
      "https://s3.us-west-2.amazonaws.com/us-west-2.opendata.source.coop/nlebovits/gpq-tiles-demo/brazil-2025-fields-v2.pmtiles";

    const VIEWS = {
      brazil:         { center: [-53.00, -14.34], zoom: 4.0 },
      matogrosso:     { center: [-55.90, -12.60], zoom: 6.5 },
      saopaulo:       { center: [-48.50, -21.50], zoom: 7.0 },
      riograndedosul: { center: [-53.20, -29.50], zoom: 6.5 },
      bahia:          { center: [-45.90, -12.40], zoom: 6.5 },
    };
    const LAYER = "overview"; // MVT source-layer name (tylertoo default)

    function showErr(m) { const e = document.getElementById("err"); e.style.display = "block"; e.textContent = m; }

    const q = new URLSearchParams(location.search);
    let url = q.get("pmtiles") || DEFAULT_PMTILES;
    if (!url.startsWith("pmtiles://")) url = "pmtiles://" + url;

    maplibregl.addProtocol("pmtiles", new pmtiles.Protocol().tile);

    const CARTO = ["a", "b", "c", "d"].map(s =>
      `https://${s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png`);

    const style = {
      version: 8,
      sources: {
        carto: { type: "raster", tiles: CARTO, tileSize: 256, maxzoom: 20,
          attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>' },
        fields: { type: "vector", url,
          attribution: 'Field boundaries: <a href="https://fieldsofthe.world">Fields of The World</a> via tylertoo' },
      },
      layers: [
        { id: "carto", type: "raster", source: "carto" },
        // Representation transition (v2, monotonic). z0-5 are an explicit point
        // band; from z6 a collapse-filled polygon band takes over, where each
        // field stays a representative POINT until it is large enough to draw as
        // a >=1px polygon (--collapse --polygon-visibility 0 --simplify-factor 4).
        // Points and polygons therefore COEXIST z6-13 and the map never loses a
        // field as you zoom in — a field goes dot -> polygon, never dot -> gone.
        // Fill/line styles ignore points, so points get their own circle layer
        // spanning the whole range (fading as polygons take over).
        { id: "field-dot", type: "circle", source: "fields", "source-layer": LAYER,
          filter: ["==", ["geometry-type"], "Point"],
          paint: { "circle-color": "#4cc9f0", "circle-opacity": 0.8,
                   "circle-radius": ["interpolate", ["linear"], ["zoom"], 0, 0.7, 5, 1.6, 10, 1.3, 14, 0.9] } },
        { id: "field-fill", type: "fill", source: "fields", "source-layer": LAYER,
          paint: { "fill-color": "#4cc9f0", "fill-opacity": 0.35 } },
        { id: "field-line", type: "line", source: "fields", "source-layer": LAYER,
          paint: { "line-color": "#9be7ff", "line-width": 0.3, "line-opacity": 0.55 } },
      ],
    };

    const start = VIEWS.brazil;
    const map = new maplibregl.Map({ container: "map", style,
      center: start.center, zoom: start.zoom, hash: true, maxZoom: 16 });
    map.addControl(new maplibregl.NavigationControl(), "bottom-right");
    map.on("error", e => { if (e && e.error) showErr("Map error: " + (e.error.message || e.error)); });

    document.querySelectorAll("[data-view]").forEach(b =>
      b.addEventListener("click", () => { const v = VIEWS[b.dataset.view]; if (v) map.flyTo({ ...v, speed: 1.6 }); }));
  </script>
</body>
</html>
